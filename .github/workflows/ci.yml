name: CI

on:
  push:
    branches: [ master, "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os_short }} x86 + x86_64)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        sm_version:
          - "1.12-dev"
        include:
          - os: ubuntu-latest
            os_short: linux
          - os: windows-latest
            os_short: win

    steps:
      - name: Prepare env
        shell: bash
        run: |
          echo "GITHUB_SHA_SHORT=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Checkout webcon
        uses: actions/checkout@v4
        with:
          path: webcon
          submodules: recursive

      - name: Checkout SourceMod
        uses: actions/checkout@v4
        with:
          repository: alliedmodders/sourcemod
          ref: ${{ matrix.sm_version }}
          submodules: recursive
          path: sourcemod

      - name: Checkout Metamod:Source
        uses: actions/checkout@v4
        with:
          repository: alliedmodders/metamod-source
          ref: master
          submodules: recursive
          path: metamod-source

      - name: Checkout HL2SDK (TF2)
        uses: actions/checkout@v4
        with:
          repository: alliedmodders/hl2sdk
          ref: tf2
          path: hl2sdk-tf2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ambuild
        run: |
          python -m pip install --upgrade pip wheel
          pip install git+https://github.com/alliedmodders/ambuild

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-multilib g++-multilib

      # Point AMBuild at the per-architecture vcvars scripts. AMBuild runs the
      # matching one for whichever target (x86 / x86_64) it is configuring, so a
      # single job builds both arches (a single vsdevcmd only exposes one).
      - name: Set up MSVC for AMBuild (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -property installationPath
          $build = "$vs\VC\Auxiliary\Build"
          "AMBUILD_VCVARS_X86=$build\vcvars32.bat"    | Out-File -FilePath $env:GITHUB_ENV -Append
          "AMBUILD_VCVARS_X86_64=$build\vcvars64.bat" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "x86:    $build\vcvars32.bat (exists: $(Test-Path "$build\vcvars32.bat"))"
          Write-Host "x86_64: $build\vcvars64.bat (exists: $(Test-Path "$build\vcvars64.bat"))"

      - name: Configure
        working-directory: webcon
        shell: bash
        run: |
          mkdir build && cd build
          python ../configure.py --targets x86,x86_64 --enable-optimize \
            --sm-path "${GITHUB_WORKSPACE}/sourcemod" \
            --mms-path "${GITHUB_WORKSPACE}/metamod-source" \
            --hl2sdk-root "${GITHUB_WORKSPACE}" \
            --sdks tf2

      - name: Build
        working-directory: webcon/build
        shell: bash
        run: ambuild

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: webcon-sm${{ matrix.sm_version }}-${{ matrix.os_short }}-${{ env.GITHUB_SHA_SHORT }}
          path: webcon/build/package
